{% extends "base.html" %}

{% block title %}{{ super() }} {{ page.description }}{% endblock %}
{% block content %}
<article class="post-article">
  <div class="post-header">
    <a class="return-link" href="..">← Retour</a>
    <div>
      <h1 class="title">{{ page.title }}</h1>
      {% if page.date %}
        <p class="subtitle"><time datetime="{{ page.date }}">{{ page.date }}</time></p>
      {% endif %}
    </div>
  </div>

  <div class="post-body">
    {{ page.content | safe }}
  </div>
</article>
{% endblock content %}
